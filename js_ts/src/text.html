<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>A4 打印测试</title>
    <style>
      /* 屏幕显示样式 */
      body {
        background: #f0f0f0;
        display: flex;
        justify-content: center;
        padding: 20px;
        font-family: Arial, sans-serif;
      }

      .a4-page {
        /* A4 尺寸 */
        width: 210mm;
        min-height: 297mm; 
        /* 使用 min-height 允许内容撑开，或者用 height 固定 */

        /* 样式 */
        background: white;
        padding: 25mm; /* 上下左右留白 */
        box-sizing: border-box; /* 确保 padding 不增加总宽度 */
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
        /* border: 1px solid #ccc; */
      }

      h1 {
        color: #333;
      }
      p {
        line-height: 1.6;
        color: #555;
      }

      /* 打印专用样式 */
      @media print {
        body {
          background: white;
          padding: 0;
          display: block;
        }

        .a4-page {
          box-shadow: none;
          margin: 0;
          /* width: 210mm; */
          width: 100%;
          /* height: 100%; */
          min-height: auto; /* 清除最小高度限制，让内容决定高度 */
          /* height: 297mm;  */
          height: 270mm; 
          /* 强制每页高度，配合 page-break */
          /* page-break-after: always; */
           /* 如果有多页，此处强制分页 */
          box-sizing: border-box;
          border: 1px solid #ccc;
        }

        /* 隐藏不需要打印的元素，比如打印按钮 */
        .no-print {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <button
      class="no-print"
      onclick="window.print()"
      style="
        position: fixed;
        top: 10px;
        right: 10px;
        padding: 10px 20px;
        cursor: pointer;
      "
    >
      🖨️ 点击打印测试
    </button>

    <div class="a4-page">
      <h1>A4 纸测试文档</h1>
      <p>这是一个标准的 A4 纸宽度容器 (210mm)。</p>
      <p>在屏幕上，你会看到它有阴影和灰色背景，模拟纸张效果。</p>
      <p>点击“打印”按钮，在打印预览中，你会发现：</p>
      <ul>
        <li>阴影消失了。</li>
        <li>背景变白了。</li>
        <li>尺寸严格对应物理 A4 纸。</li>
      </ul>
      <p>尝试添加更多内容，看看分页效果...</p>
      <!-- 填充内容以测试分页 -->
      <br /><br /><br /><br /><br /><br /><br /><br /><br /><br />
      <p>（这里是页面底部）</p>
    </div>
  </body>
</html>
